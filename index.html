<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown Timer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 2rem;
      text-align: center;
    }

    h1 {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 2.5rem;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 0.75rem;
    }

    input[type="time"] {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      padding: 0 16px;
      height: 44px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="time"]:focus { border-color: #444; }

    button {
      background: #fff;
      color: #0f0f0f;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      padding: 0 20px;
      height: 44px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }
    button:active { opacity: 0.7; }

    .error {
      font-size: 12px;
      color: #e24b4a;
      min-height: 18px;
      margin-bottom: 1.5rem;
    }

    .display { display: none; }

    .big {
      font-size: 72px;
      font-weight: 300;
      letter-spacing: -3px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .sublabel {
      font-size: 13px;
      color: #555;
      margin-bottom: 2rem;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 2rem;
    }

    .card {
      background: #1a1a1a;
      border-radius: 8px;
      padding: 14px 8px;
    }

    .card-val {
      font-size: 22px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .card-lbl {
      font-size: 11px;
      color: #555;
      margin-top: 4px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .bar-wrap {
      height: 3px;
      background: #1a1a1a;
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    #bar {
      height: 100%;
      border-radius: 99px;
      background: #3dd68c;
      width: 0%;
      transition: width 0.6s, background 0.6s;
    }

    #reset-btn {
      background: transparent;
      color: #555;
      border: 1px solid #2a2a2a;
      font-size: 13px;
      font-weight: 400;
    }

    #reset-btn:hover { color: #fff; border-color: #444; opacity: 1; }

    .done { display: none; text-align: center; padding: 1rem 0; }
    .done-icon { font-size: 40px; margin-bottom: 1rem; }
    .done h2 { font-size: 20px; font-weight: 400; margin-bottom: 0.5rem; }
    .done p { font-size: 13px; color: #555; margin-bottom: 1.5rem; }
  </style>
</head>
<body>
<div class="container">
  <h1>Countdown</h1>

  <div id="setup">
    <div class="input-row">
      <input type="time" id="t" />
      <button id="go">Start</button>
    </div>
    <div class="error" id="err"></div>
  </div>

  <div class="display" id="display">
    <div class="big" id="big">00:00:00</div>
    <div class="sublabel" id="sub"></div>
    <div class="cards">
      <div class="card"><div class="card-val" id="hh">00</div><div class="card-lbl">hrs</div></div>
      <div class="card"><div class="card-val" id="mm">00</div><div class="card-lbl">min</div></div>
      <div class="card"><div class="card-val" id="ss">00</div><div class="card-lbl">sec</div></div>
    </div>
    <div class="bar-wrap"><div id="bar"></div></div>
    <button id="reset-btn">↺ Reset</button>
  </div>

  <div class="done" id="done">
    <div class="done-icon">✓</div>
    <h2 id="done-title"></h2>
    <p>Time's up.</p>
    <button id="again-btn">Set another time</button>
  </div>
</div>

<script>
  const pad = n => String(n).padStart(2, '0');
  const fmtAmPm = (h, m) => `${h % 12 || 12}:${pad(m)} ${h >= 12 ? 'PM' : 'AM'}`;

  let iv = null, totalSec = 0, targetMs = null;

  const el = id => document.getElementById(id);

  el('go').onclick = start;
  el('t').addEventListener('keydown', e => e.key === 'Enter' && start());
  el('reset-btn').onclick = reset;
  el('again-btn').onclick = reset;

  const now = new Date();
  el('t').value = `${pad(now.getHours())}:${pad(now.getMinutes())}`;

  function start() {
    const parts = el('t').value.split(':').map(Number);
    if (parts.length < 2 || isNaN(parts[0])) return;
    const [h, m] = parts;

    const now = new Date();
    const target = new Date();
    target.setHours(h, m, 0, 0);

    if (target <= now) {
      el('err').textContent = 'That time has already passed today.';
      return;
    }

    el('err').textContent = '';
    targetMs = target.getTime();
    totalSec = Math.round((targetMs - now.getTime()) / 1000);
    el('done-title').textContent = `It's ${fmtAmPm(h, m)}`;

    el('setup').style.display = 'none';
    el('display').style.display = 'block';
    el('done').style.display = 'none';

    if (iv) clearInterval(iv);
    tick();
    iv = setInterval(tick, 1000);
  }

  function tick() {
    const diff = Math.max(0, Math.round((targetMs - Date.now()) / 1000));

    if (diff <= 0) {
      clearInterval(iv);
      el('display').style.display = 'none';
      el('done').style.display = 'block';
      return;
    }

    const h = Math.floor(diff / 3600);
    const m = Math.floor((diff % 3600) / 60);
    const s = diff % 60;

    el('big').textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
    el('hh').textContent = pad(h);
    el('mm').textContent = pad(m);
    el('ss').textContent = pad(s);

    const pct = Math.min(100, Math.round(((totalSec - diff) / totalSec) * 100));
    el('bar').style.width = pct + '%';
    el('bar').style.background = pct > 80 ? '#e24b4a' : pct > 50 ? '#f0a500' : '#3dd68c';

    const mins = Math.ceil(diff / 60);
    el('sub').textContent = mins === 1 ? '1 minute left' : `${mins} minutes left`;
  }

  function reset() {
    clearInterval(iv);
    el('setup').style.display = 'block';
    el('display').style.display = 'none';
    el('done').style.display = 'none';
    el('bar').style.width = '0%';
    el('err').textContent = '';
  }
</script>
</body>
</html>
